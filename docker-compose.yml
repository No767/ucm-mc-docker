name: ucm_mc_docker

include:
  - path: metrics/docker-compose.metrics.yml
    project_directory: metrics
    env_file: .env

services:
  mc:
    container_name: ucm_mc_server
    image: itzg/minecraft-server:java21
    tty: true
    stdin_open: true
    ports:
      - "25565:25565/tcp"
      - "19132:19132/udp"
      - "9770:9770/tcp"
    environment:
      # Treat them as system accounts
      UID: 999
      GID: 999

      # General settings
      VERSION: "1.21.8"
      EULA: "TRUE"
      TYPE: "PAPER"
      PAPER_CHANNEL: "experimental"
      MEMORY: "10244M"
      USE_MEOWICE_FLAGS: "true"
      ICON: "/icon.png"
      OVERRIDE_ICON: "true"

      # Environment variables within configs
      REPLACE_ENV_VARIABLES: "true"
      REPLACE_ENV_VARIABLES_EXCLUDES: |
        data/plugins/Geyser-Spigot/custom-skulls.yml
        data/plugins/CoreProtect/language.yml
        data/plugins/LuckPerms/translations

      # Environment variables for database connections
      ENV_VARIABLE_PREFIX: "CFG_"
      CFG_DB: mc
      CFG_DB_HOST: database
      CFG_DB_USER: ${MARIADB_USER}
      CFG_DB_PASSWORD: ${MARIADB_PASSWORD}

      # Patch both bukkit and spigot configs
      PATCH_DEFINITIONS: /patches/bukkit-spigot-config.json

      # Maintain server seed
      # SEED: "8312171185849629204"

      # Game settings
      MAX_PLAYERS: 30
      MODE: "survival"
      DIFFICULTY: "normal"

      # Plugins
      MODRINTH_PROJECTS: |
        chunky
        coreprotect
        luckperms
        terra:beta
        viaversion:beta
        bolt

      # Direct plugin sources
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
        https://github.com/Bleep0/AntiBookBan/releases/download/1.3/AntiBookBan.jar
        https://github.com/Cubxity/UnifiedMetrics/releases/download/v0.3.x-SNAPSHOT/unifiedmetrics-platform-bukkit-0.3.10-SNAPSHOT.jar

      # Yes, Noelle is server op
      OPS: |
        Winter_Melody
        Anarele

      RCON_CMDS_STARTUP: |
        gamerule playersSleepingPercentage 0
      
      # Whitelist
      WHITELIST_FILE: /whitelist.json
      ENFORCE_WHITELIST: "true"
      ENABLE_WHITELIST: "true"

      # server.properties override 
      MOTD: "UC MERCED SERVER YAAAAAAY"
      NETWORK_COMPRESSION_THRESHOLD: 256
      SIMULATION_DISTANCE: 6
      VIEW_DISTANCE: 8
      ENABLE_STATUS: "true"
    depends_on:
      database:
        condition: service_healthy
    logging:
      driver: "json-file"
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20
    volumes:
      - "${DATA_LOCATION}:/data"
      - "./patches/bukkit-spigot-config.json:/patches/bukkit-spigot-config.json"
      - "./whitelist.json:/whitelist.json"
      - "./configs:/config"
      - "./mc-plugins:/plugins"
      - "./server-icon.png:/icon.png"
    restart: unless-stopped

  database:
    container_name: ucm_mc_database
    image: mariadb:lts-noble
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_AUTO_UPGRADE: ${MARIADB_AUTO_UPGRADE}
      MARIADB_RANDOM_ROOT_PASSWORD: ${MARIADB_RANDOM_ROOT_PASSWORD}
    networks:
      - default
      - proxy_bridge
    logging:
      driver: "json-file"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - "${DB_DATA_LOCATION}:/var/lib/mysql:Z"
      - ./metrics/configs/mysql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: unless-stopped

  alloy:
    container_name: ucm_mc_alloy
    image: grafana/alloy:latest
    command: >
      run 
      --server.http.listen-addr=0.0.0.0:12345 
      --storage.path=/var/lib/alloy/data 
      /etc/alloy/config.alloy
    ports:
      - 12345:12345
    networks:
      - default
      - proxy_bridge
    depends_on:
      loki:
        condition: service_started
        restart: true
    volumes:
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./metrics/configs/alloy/config.alloy:/etc/alloy/config.alloy
    restart: unless-stopped

  loki:
    container_name: ucm_mc_loki
    image: grafana/loki:latest
    ports:
      - 3100:3100
    networks:
      - default
      - proxy_bridge
    healthcheck:
      test: wget -q -O /dev/null http://loki:3100/ready || exit 1
      start_period: 5s
      interval: 5s
      start_interval: 5s
    volumes:
      - loki_data:/loki
      - ./metrics/configs/loki/loki-local-config.yml:/etc/loki/local-config.yaml
    restart: unless-stopped

  prometheus:
    container_name: ucm_mc_prometheus
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    networks:
      - default
      - proxy_bridge
    healthcheck:
      test: wget -q -O /dev/null http://prometheus:9090/api/v1/status/buildinfo || exit 1
      start_period: 5s # old is 1m
      interval: 5s
      start_interval: 5s # 30s
    volumes:
      - prometheus_data:/prometheus
      - ./metrics/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  haproxy:
    container_name: ucm_mc_haproxy
    image: haproxy:lts-alpine
    ports:
      - 80:80
      - 443:443
      - 8404:8404
    networks:
      - default
      - proxy_bridge
    healthcheck:
      test: wget -q -O /dev/null http://haproxy:8404/metrics || exit 1
      start_period: 5s
      interval: 5s
      start_interval: 5s
    volumes:
      - /etc/ssl/ucm-mc-certs/loki-ucm-mc.mineced.org.pem:/etc/ssl/ucm-mc-certs/loki-ucm-mc.mineced.org.pem
      - /etc/ssl/ucm-mc-certs/prometheus-ucm-mc.mineced.org.pem:/etc/ssl/ucm-mc-certs/prometheus-ucm-mc.mineced.org.pem
      - ./metrics/configs/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - ./metrics/configs/haproxy/hostnames.map:/usr/local/etc/haproxy/hostnames.map
    restart: unless-stopped

networks:
  proxy_bridge:
    driver: bridge

volumes:
  alloy_data:
  loki_data:
  prometheus_data:
  haproxy_data:
