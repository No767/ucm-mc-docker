name: ucm_mc_docker

include:
  - path: metrics/docker-compose.metrics.yml
    project_directory: metrics
    env_file: .env

  - path: metrics/docker-compose.exporters.yml
    project_directory: metrics
    env_file: .env

services:
  mc:
    container_name: ucm_mc_server
    image: itzg/minecraft-server:java21
    tty: true
    stdin_open: true
    ports:
      - "25565:25565/tcp"
      - "19132:19132/udp"
      - "9770:9770/tcp"
    environment:
      # Treat them as system accounts
      UID: 999
      GID: 999

      # General settings
      VERSION: "1.21.8"
      EULA: "TRUE"
      TYPE: "PAPER"
      PAPER_CHANNEL: "experimental"
      MEMORY: "6144M"
      ICON: "/icon.png"
      OVERRIDE_ICON: "true"

      # Environment variables within configs
      REPLACE_ENV_VARIABLES: "true"
      REPLACE_ENV_VARIABLES_EXCLUDES: |
        data/plugins/Geyser-Spigot/custom-skulls.yml
        data/plugins/CoreProtect/language.yml
        data/plugins/LuckPerms/translations

      # Environment variables for database connections
      ENV_VARIABLE_PREFIX: "CFG_"
      CFG_DB: mc
      CFG_DB_HOST: database
      CFG_DB_USER: ${MARIADB_USER}
      CFG_DB_PASSWORD: ${MARIADB_PASSWORD}

      # Apply patches for bukkit, spigot, and paper configuration files
      PATCH_DEFINITIONS: /patches/

      # Maintain server seed
      # SEED: "8312171185849629204"

      # Game settings
      MAX_PLAYERS: 20
      MODE: "survival"
      DIFFICULTY: "normal"

      # Plugins
      MODRINTH_PROJECTS: |
        chunky
        terra:beta
        luckperms
        bolt
        viaversion:beta

      # Direct plugin sources
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
        https://ci.lucko.me/job/spark/lastStableBuild/artifact/spark-bukkit/build/libs/spark-1.10.165-bukkit.jar
        https://github.com/Cubxity/UnifiedMetrics/releases/download/v0.3.x-SNAPSHOT/unifiedmetrics-platform-bukkit-0.3.10-SNAPSHOT.jar

      # Yes, Noelle is server op
      OPS: |
        Winter_Melody
        Anarele

      RCON_CMDS_STARTUP: |
        gamerule playersSleepingPercentage 0
      
      # Whitelist
      WHITELIST_FILE: /whitelist.json
      ENFORCE_WHITELIST: "true"
      ENABLE_WHITELIST: "true"

      # server.properties override 
      CUSTOM_SERVER_PROPERTIES: |
        paper.preferSparkPlugin=true

      MOTD: "UC MERCED SERVER YAAAAAAY"
      NETWORK_COMPRESSION_THRESHOLD: 256
      SIMULATION_DISTANCE: 6
      VIEW_DISTANCE: 8
      ENABLE_STATUS: "true"
    networks:
      - default
      - proxy_bridge
    depends_on:
      database:
        condition: service_healthy
    logging:
      driver: "json-file"
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: "6G"
        reservations:
          memory: "4G"
    volumes:
      - "${DATA_LOCATION}:/data"
      - "./patches:/patches"
      - "./mc-plugins:/plugins"
      - "./whitelist.json:/whitelist.json"
      - "./server-icon.png:/icon.png"
    restart: unless-stopped

  database:
    container_name: ucm_mc_database
    image: mariadb:lts-noble
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_AUTO_UPGRADE: ${MARIADB_AUTO_UPGRADE}
      MARIADB_RANDOM_ROOT_PASSWORD: ${MARIADB_RANDOM_ROOT_PASSWORD}
    networks:
      - default
      - proxy_bridge
    logging:
      driver: "json-file"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - "${DB_DATA_LOCATION}:/var/lib/mysql:Z"
      - ./metrics/configs/mysql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: unless-stopped

networks:
  proxy_bridge:
    driver: bridge
