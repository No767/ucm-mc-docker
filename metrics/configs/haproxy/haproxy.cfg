global
        log /dev/log    local0
        log /dev/log    local1 notice
        
        user root
        group root

        # See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

userlist authlist
        group services users loki,prometheus

        user loki password $2b$08$1pVJEsjcjXtfzHkPrj9c6up3FT7dCRfTJu1zusL1fGrRjyV3xqwkm
        user prometheus password $2b$08$Q.02s8daNsZQuyisQNo9Hu4y7Ar4O/kgthBuHPE/u3BvCCFJnuoPW

defaults
        log     global
        mode    http
        option  httplog
        option  dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000
        errorfile 400 /usr/local/etc/haproxy/errors/400.http
        errorfile 403 /usr/local/etc/haproxy/errors/403.http
        errorfile 408 /usr/local/etc/haproxy/errors/408.http
        errorfile 500 /usr/local/etc/haproxy/errors/500.http
        errorfile 502 /usr/local/etc/haproxy/errors/502.http
        errorfile 503 /usr/local/etc/haproxy/errors/503.http
        errorfile 504 /usr/local/etc/haproxy/errors/504.http

frontend stats
        bind *:8404
        http-request use-service prometheus-exporter if { path /metrics }
        stats enable
        stats uri /stats
        stats refresh 10s

frontend ucm-mc-proxy
        bind *:80
        bind *:443 ssl crt /etc/ssl/ucm-mc-certs/

        redirect scheme https code 301 if !{ ssl_fc }
        acl letsencrypt-acl path_beg /.well-known/acme-challenge/
        use_backend letsencrypt-backend if letsencrypt-acl

        http-request auth unless { http_auth(authlist) }

        use_backend %[req.hdr(host),map(/usr/local/etc/haproxy/hostnames.map,prometheus)]

backend letsencrypt-backend
        server letsencrypt 127.0.0.1:8888

backend prometheus
        server prometheus-server prometheus:9090

backend loki
        server loki-server loki:3100
