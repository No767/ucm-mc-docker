name: ucm_mc_docker_exporters

services:
  cadvisor:
    container_name: ucm_mc_cadvisor
    image: ghcr.io/google/cadvisor:v0.53.0
    ports:
      - 8080:8080
    privileged: true
    devices:
      - "/dev/kmsg"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    restart: unless-stopped

  node_exporter:
    container_name: ucm_mc_node_exporter
    image: prom/node-exporter:latest
    ports:
      - 9100:9100
    networks:
      - default
      - proxy_bridge
    command: "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    restart: unless-stopped

  mysql_exporter:
    container_name: ucm_mc_mysql_exporter
    image: prom/mysqld-exporter:latest
    ports:
      - 9104:9104
    networks:
      - default
      - proxy_bridge
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: wget -q -O /dev/null http://mysql_exporter:9104/metrics || exit 1
      start_period: 15s
      interval: 30s
      start_interval: 15s
    volumes:
      - "./configs/mysql/mysql.cnf:/.my.cnf"
    restart: unless-stopped