name: ucm_mc_docker_services

services:
  alloy:
    container_name: ucm_mc_alloy
    image: grafana/alloy:latest
    command: >
      run 
      --server.http.listen-addr=0.0.0.0:12345 
      --storage.path=/var/lib/alloy/data 
      /etc/alloy/config.alloy
    ports:
      - 12345:12345
    networks:
      - default
      - proxy_bridge
    depends_on:
      loki:
        condition: service_started
        restart: true
    volumes:
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/alloy/config.alloy:/etc/alloy/config.alloy
    restart: unless-stopped

  loki:
    container_name: ucm_mc_loki
    image: grafana/loki:latest
    ports:
      - 3100:3100
    networks:
      - default
      - proxy_bridge
    healthcheck:
      test: wget -q -O /dev/null http://loki:3100/ready || exit 1
      start_period: 15s
      interval: 30s
      start_interval: 15s
    volumes:
      - loki_data:/loki
      - ./configs/loki/loki-local-config.yml:/etc/loki/local-config.yaml
    restart: unless-stopped

  prometheus:
    container_name: ucm_mc_prometheus
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    networks:
      - default
      - proxy_bridge
    healthcheck:
      test: wget -q -O /dev/null http://prometheus:9090/api/v1/status/buildinfo || exit 1
      start_period: 15s # old is 1m
      interval: 30s
      start_interval: 15s # 30s
    volumes:
      - prometheus_data:/prometheus
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  haproxy:
    container_name: ucm_mc_haproxy
    image: haproxy:lts-alpine
    ports:
      - 80:80
      - 443:443
      - 8404:8404
    environment:
      LOKI_PASSWORD: ${LOKI_PASSWORD}
      PROMETHEUS_PASSWORD: ${PROMETHEUS_PASSWORD}
    networks:
      - default
      - proxy_bridge
    healthcheck:
      test: wget -q -O /dev/null http://haproxy:8404/metrics || exit 1
      start_period: 15s
      interval: 30s
      start_interval: 15s
    volumes:
      - /etc/ssl/ucm-mc-certs/loki-ucm-mc.mineced.org.pem:/etc/ssl/ucm-mc-certs/loki-ucm-mc.mineced.org.pem
      - /etc/ssl/ucm-mc-certs/prometheus-ucm-mc.mineced.org.pem:/etc/ssl/ucm-mc-certs/prometheus-ucm-mc.mineced.org.pem
      - ./configs/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - ./configs/haproxy/hostnames.map:/usr/local/etc/haproxy/hostnames.map
    restart: unless-stopped

volumes:
  alloy_data:
  loki_data:
  prometheus_data: