server {
  listen 443 ssl;
  server_name  loki-ucm-mc.mineced.org;
  
  ssl_certificate /etc/letsencrypt/live/loki-ucm-mc.mineced.org/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/loki-ucm-mc.mineced.org/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

  resolver 127.0.0.11 valid=30s;

  location ^~ /.well-known/acme-challenge/ {
      default_type "text/plain";
      root /var/www/letsencrypt;
  }


  location / {
    auth_basic           "admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://loki:3100;
  }
}

server {
    if ($host = loki-ucm-mc.mineced.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name  loki-ucm-mc.mineced.org;
    return 404; # managed by Certbot
}